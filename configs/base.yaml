model:
  name_or_path: "unsloth/Qwen2.5-Coder-1.5B-Instruct-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

data:
  dataset_name: "Beryex/xlam-function-calling-60k-sharegpt"
  dataset_limit: 60000

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  warmup_steps: 5
  num_train_epochs: 1
  learning_rate: 2.0e-4
  logging_steps: 10
  save_steps: 1000
  optim: "paged_adamw_8bit"
  weight_decay: 0.01
  lr_scheduler_type: "linear"
  seed: 3407
  output_dir: "outputs"
  logging_dir: "logs"
  report_to: "wandb"
  run_name: "qwen-coder-tool-router-v1"
